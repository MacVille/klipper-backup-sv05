[gcode_macro _ADAPTIVE_PURGE]
description: Smart adaptive purge with safe fallback (OrcaSlicer + exclude_object)
gcode:
    {% set margin = 5 %}
    {% set purge_length = 80 %}
    {% set purge_amount = 10 %}
    {% set z_height = 0.3 %}
    {% set travel_speed = 6000 %}
    {% set purge_speed = 800 %}

    {% set bed_min_x = printer.toolhead.axis_minimum.x %}
    {% set bed_max_x = printer.toolhead.axis_maximum.x %}
    {% set bed_min_y = printer.toolhead.axis_minimum.y %}
    {% set bed_max_y = printer.toolhead.axis_maximum.y %}

    {% set objects = printer.exclude_object.objects %}

    # Wenn keine Objekte erkannt → fallback vorne links
    {% if objects|length == 0 %}
        {% set purge_x_start = bed_min_x + margin %}
        {% set purge_y = bed_min_y + margin %}
    {% else %}
        {% set print_min_x = objects | map(attribute='min_x') | min %}
        {% set print_max_x = objects | map(attribute='max_x') | max %}
        {% set print_min_y = objects | map(attribute='min_y') | min %}
        {% set print_max_y = objects | map(attribute='max_y') | max %}

        # Versuche vorne unterhalb des Prints zu purgen
        {% if print_min_y > (bed_min_y + margin + 10) %}
            {% set purge_y = bed_min_y + margin %}
            {% set purge_x_start = print_min_x %}
        # Versuche hinten oberhalb
        {% elif print_max_y < (bed_max_y - margin - 10) %}
            {% set purge_y = bed_max_y - margin - 2 %}
            {% set purge_x_start = print_min_x %}
        # Versuche links
        {% elif print_min_x > (bed_min_x + margin + purge_length) %}
            {% set purge_x_start = bed_min_x + margin %}
            {% set purge_y = print_min_y %}
        # Versuche rechts
        {% elif print_max_x < (bed_max_x - margin - purge_length) %}
            {% set purge_x_start = bed_max_x - margin - purge_length %}
            {% set purge_y = print_min_y %}
        # GAR KEIN Platz → harte fallback Position vorne links
        {% else %}
            {% set purge_x_start = bed_min_x + margin %}
            {% set purge_y = bed_min_y + margin %}
        {% endif %}
    {% endif %}

    {% set purge_x_end = purge_x_start + purge_length %}
    {% if purge_x_end > bed_max_x %}
        {% set purge_x_end = bed_max_x - margin %}
    {% endif %}

    G90
    G92 E0

    G1 Z5 F3000
    G1 X{purge_x_start} Y{purge_y} F{travel_speed}
    G1 Z{z_height} F1000

    G1 X{purge_x_end} E{purge_amount} F{purge_speed}

    G92 E0
    G1 Z5 F3000